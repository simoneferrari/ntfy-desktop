name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # Optional: set a VirusTotal API key as the VT_API_KEY repo secret to have
      # each release's exe submitted to VirusTotal and a scan link added to the notes.
      # If the secret is absent, the scan step is skipped and the release still ships.
      VT_API_KEY: ${{ secrets.VT_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish NtfyDesktop.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/

      - name: Scan with VirusTotal
        id: vt
        if: env.VT_API_KEY != ''
        shell: pwsh
        run: |
          $file = "publish/NtfyDesktop.exe"
          $sha = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()

          # Get a large-file upload URL (the direct /files endpoint caps at 32 MB;
          # the self-contained exe is larger).
          try {
            $uploadUrl = (Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files/upload_url" `
                          -Headers @{ "x-apikey" = $env:VT_API_KEY }).data
          } catch {
            Write-Warning "Could not get VirusTotal upload URL: $($_.Exception.Message)"
            exit 0   # never fail the release on a scanning hiccup
          }

          # Upload via curl — its multipart handling is more reliable than
          # Invoke-RestMethod -Form for this endpoint. Capture status + body.
          $status = curl.exe -s -o vt-response.json -w "%{http_code}" `
                      -X POST "$uploadUrl" `
                      -H "x-apikey: $env:VT_API_KEY" `
                      -F "file=@$file"

          if ($status -eq "200") {
            "url=https://www.virustotal.com/gui/file/$sha" >> $env:GITHUB_OUTPUT
            Write-Host "Submitted to VirusTotal (sha256 $sha)."
          } else {
            Write-Warning "VirusTotal upload returned HTTP $status"
            if (Test-Path vt-response.json) { Get-Content vt-response.json | Write-Host }
          }

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/NtfyDesktop.exe
          generate_release_notes: true
          body: ${{ steps.vt.outputs.url && format('**VirusTotal scan:** {0}', steps.vt.outputs.url) || '' }}
