name: Bug report
description: Something isn't working as expected
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Add a topic …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 24H2
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, error messages — anything that might help.
    validations:
      required: false
